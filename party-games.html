<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎉 ألعاب جماعية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080f;--card:#0f1018;--border:rgba(255,255,255,0.07);
  --a1:#ff3cac;--a2:#784ba0;--a3:#2b86c5;--a4:#00f5a0;
  --text:#f0f0ff;--muted:#6b6b88;--r:20px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
.screen{display:none;flex-direction:column;height:100vh;overflow:hidden}
.screen.active{display:flex}

/* HOME */
#home{background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(255,60,172,0.13) 0%,transparent 70%),var(--bg);align-items:center;justify-content:flex-start;padding:44px 20px 30px;overflow-y:auto}
.home-top{text-align:center;margin-bottom:32px;width:100%}
.logo-ring{width:86px;height:86px;margin:0 auto 16px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a3));display:flex;align-items:center;justify-content:center;font-size:38px;box-shadow:0 0 40px rgba(255,60,172,0.4);animation:pulse 3s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(255,60,172,0.4)}50%{box-shadow:0 0 70px rgba(255,60,172,0.7)}}
.home-title{font-size:28px;font-weight:900;background:linear-gradient(135deg,#fff,rgba(255,255,255,0.6));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.home-sub{color:var(--muted);font-size:14px;margin-top:6px}
.ai-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(0,245,160,.1);border:1px solid rgba(0,245,160,.25);border-radius:99px;padding:5px 12px;font-size:11px;color:var(--a4);margin-top:12px}
.game-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:400px}
.gcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px 14px 18px;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;text-align:center}
.gcard:active{transform:scale(.94)}
.gcard::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;border-radius:var(--r)}
.gcard:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.5)}
.gcard:hover::before{opacity:1}
.gc1::before{background:linear-gradient(135deg,rgba(255,60,172,.2),transparent)}
.gc2::before{background:linear-gradient(135deg,rgba(120,75,160,.25),transparent)}
.gc3::before{background:linear-gradient(135deg,rgba(43,134,197,.2),transparent)}
.gc4::before{background:linear-gradient(135deg,rgba(0,245,160,.15),transparent)}
.gcard-icon{font-size:34px;margin-bottom:10px;display:block;position:relative;z-index:1}
.gcard-name{font-size:13px;font-weight:700;position:relative;z-index:1}
.gcard-sub{font-size:11px;color:var(--muted);margin-top:4px;position:relative;z-index:1}

/* GAME TOPBAR */
#game{padding:0}
.game-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;flex-shrink:0}
.back-btn{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:99px;padding:7px 16px;font-size:13px;font-family:'Tajawal',sans-serif;cursor:pointer}
.game-mode-title{font-size:14px;font-weight:700;color:var(--muted)}
.ai-gen-btn{background:rgba(0,245,160,.12);border:1px solid rgba(0,245,160,.3);color:var(--a4);border-radius:99px;padding:7px 14px;font-size:12px;font-family:'Tajawal',sans-serif;cursor:pointer}
.ai-gen-btn.hidden{visibility:hidden}

/* PROGRESS */
.prog-wrap{padding:0 16px 12px;flex-shrink:0}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prog-count{font-size:12px;color:var(--muted)}
.prog-track{height:4px;background:rgba(255,255,255,0.07);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--a1),var(--a3));border-radius:99px;transition:width .4s ease}
.score-bar{font-size:13px;color:var(--muted)}
.score-bar span{font-weight:900;color:var(--text)}

/* CARD AREA */
.card-scroll{flex:1;overflow-y:auto;padding:0 16px 24px;display:flex;flex-direction:column;align-items:center;gap:14px}

/* Q CARD */
.q-card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:28px 22px;width:100%;max-width:380px;text-align:center;animation:cardIn .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes cardIn{from{opacity:0;transform:scale(.85) translateY(24px)}to{opacity:1;transform:scale(1) translateY(0)}}
.q-tag{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--a1);margin-bottom:14px}
.q-text{font-size:20px;font-weight:900;line-height:1.45}
.q-hint{font-size:12px;color:var(--muted);margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}

/* ANSWER */
.ans-card{background:linear-gradient(135deg,rgba(0,245,160,.12),rgba(43,134,197,.08));border:1px solid rgba(0,245,160,.25);border-radius:16px;padding:14px 20px;text-align:center;width:100%;max-width:380px;display:none;animation:cardIn .3s ease}
.ans-card.show{display:block}
.ans-label{font-size:10px;color:var(--a4);letter-spacing:2px;font-weight:700}
.ans-text{font-size:26px;font-weight:900;margin-top:5px}

/* BUTTONS */
.btn-row{display:flex;gap:10px;width:100%;max-width:380px}
.btn{flex:1;padding:15px;border-radius:14px;border:none;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:transform .15s}
.btn:active{transform:scale(.95)}
.btn-show{background:linear-gradient(135deg,var(--a2),var(--a1));color:#fff}
.btn-next{background:linear-gradient(135deg,var(--a3),var(--a4));color:#07080f}
.btn:disabled{opacity:.3;pointer-events:none}

/* TILES */
.tiles{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:14px 0 4px}
.tile{min-width:42px;height:48px;padding:0 10px;background:linear-gradient(135deg,var(--a2),var(--a1));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:900;box-shadow:0 4px 14px rgba(255,60,172,.3)}

/* TIMER */
.timer-circle{width:48px;height:48px;position:relative;flex-shrink:0}
.timer-circle svg{position:absolute;inset:0;transform:rotate(-90deg)}
.timer-circle circle{fill:none;stroke-width:3.5}
.tc-bg{stroke:rgba(255,255,255,.08)}
.tc-fill{stroke:var(--a4);stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .5s}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900}

/* ANIMAL GAME */
.photo-wrap{width:100%;max-width:330px;aspect-ratio:1;border-radius:22px;overflow:hidden;position:relative;border:1px solid var(--border);background:#111;flex-shrink:0}
.animal-img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .3s}
.reveal-overlay{position:absolute;inset:0;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr)}
.rv{background:var(--bg);transition:opacity .5s ease}
.rv.gone{opacity:0;pointer-events:none}
.reveal-steps{display:flex;gap:6px;justify-content:center}
.rstep{width:28px;height:6px;border-radius:99px;background:rgba(255,255,255,.1);transition:background .3s}
.rstep.done{background:var(--a4)}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:330px}
.opt{background:var(--card);border:1.5px solid var(--border);color:var(--text);border-radius:13px;padding:13px 8px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center}
.opt:active{transform:scale(.95)}
.opt.correct{background:rgba(0,245,160,.18);border-color:var(--a4);color:var(--a4)}
.opt.wrong{background:rgba(255,60,172,.12);border-color:var(--a1)}
.more-btn{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);border-radius:13px;padding:12px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;width:100%;max-width:330px;transition:opacity .2s}
.more-btn:disabled{opacity:.3}

/* AI LOADING */
.ai-loading{display:flex;flex-direction:column;align-items:center;gap:14px;padding:50px 20px;width:100%}
.ai-spinner{width:46px;height:46px;border:3px solid rgba(0,245,160,.15);border-top-color:var(--a4);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* END */
#end{background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(43,134,197,.15) 0%,transparent 70%),var(--bg);align-items:center;justify-content:center;gap:18px;padding:30px 20px}
.end-icon{font-size:72px;animation:pop .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(0) rotate(-20deg)}to{transform:scale(1) rotate(0)}}
.end-title{font-size:30px;font-weight:900}
.end-sub{color:var(--muted);font-size:14px;text-align:center}
.score-pill{background:linear-gradient(135deg,var(--a1),var(--a3));border-radius:20px;padding:22px 44px;text-align:center}
.score-big{font-size:56px;font-weight:900;line-height:1}
.score-lbl{font-size:13px;opacity:.8;margin-top:4px}
.btn-home{background:var(--card);border:1.5px solid var(--border);color:var(--text);border-radius:14px;padding:15px 44px;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="home">
  <div class="home-top">
    <div class="logo-ring">🎉</div>
    <div class="home-title">ألعاب جماعية</div>
    <div class="home-sub">اختار لعبة وابدأ مع الأصحاب</div>
    <div class="ai-badge">✨ يدعم توليد أسئلة بـ AI</div>
  </div>
  <div class="game-grid">
    <div class="gcard gc1" onclick="startGame('badeeha')">
      <span class="gcard-icon">⚡</span>
      <div class="gcard-name">البديهة السريعة</div>
      <div class="gcard-sub">جاوب خطأ!</div>
    </div>
    <div class="gcard gc2" onclick="startGame('algaz')">
      <span class="gcard-icon">🧩</span>
      <div class="gcard-name">الألغاز</div>
      <div class="gcard-sub">فكر وخمن</div>
    </div>
    <div class="gcard gc3" onclick="startGame('scramble')">
      <span class="gcard-icon">🔀</span>
      <div class="gcard-name">الكلمة المخلوطة</div>
      <div class="gcard-sub">رتب الحروف</div>
    </div>
    <div class="gcard gc4" onclick="startGame('animals')">
      <span class="gcard-icon">🐾</span>
      <div class="gcard-name">خمن الحيوان</div>
      <div class="gcard-sub">صور حقيقية</div>
    </div>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="game">
  <div class="game-topbar">
    <button class="back-btn" onclick="goHome()">← رجوع</button>
    <div class="game-mode-title" id="gTitle"></div>
    <button class="ai-gen-btn hidden" id="aiGenBtn" onclick="generateWithAI()">✨ جدّد</button>
  </div>
  <div class="prog-wrap">
    <div class="prog-row">
      <span class="prog-count" id="progCount"></span>
      <div id="timerWrap" style="display:none">
        <div class="timer-circle">
          <svg viewBox="0 0 48 48"><circle class="tc-bg" cx="24" cy="24" r="20"/><circle class="tc-fill" id="tcFill" cx="24" cy="24" r="20" stroke-dasharray="125.7" stroke-dashoffset="0"/></svg>
          <div class="timer-num" id="timerNum">8</div>
        </div>
      </div>
      <div class="score-bar" id="scoreBar" style="display:none">نقاط: <span id="liveScore">0</span></div>
    </div>
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>
  <div class="card-scroll" id="cardScroll"></div>
</div>

<!-- END -->
<div class="screen" id="end">
  <div class="end-icon">🏆</div>
  <div class="end-title" id="endTitle">انتهت اللعبة!</div>
  <div class="end-sub" id="endSub"></div>
  <div class="score-pill">
    <div class="score-big" id="scoreNum">0</div>
    <div class="score-lbl" id="scoreLbl">نقطة</div>
  </div>
  <button class="btn-home" onclick="goHome()">🏠 الرئيسية</button>
</div>

<script>
// ══════════════════════════════════════

// ══════════════════════════════════════

// ══════════════════════════════════════
// SCRAMBLE – proper shuffle function
// ══════════════════════════════════════
function shuffleStr(str) {
  // Fisher-Yates on array of chars
  const arr = str.split('');
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  // Make sure it's not equal to original
  const result = arr.join('');
  return result === str && str.length > 1 ? shuffleStr(str) : result;
}

function buildScramble(word) {
  const shuffled = shuffleStr(word);
  return { original: word, display: shuffled.split('').join(' '), a: word };
}

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let mode, queue, idx, score, timerID, timeLeft;

const shuffle = arr => [...arr].sort(() => Math.random() - .5);
const pick = (arr, n) => shuffle(arr).slice(0, n);

function goHome() { clearInterval(timerID); showScreen('home'); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame(m) {
  mode = m; idx = 0; score = 0;
  if (m === 'animals') {
    queue = shuffle(ANIMALS);
  } else if (m === 'badeeha') {
    queue = pick(BANK.badeeha, 25);
  } else if (m === 'algaz') {
    queue = pick(BANK.algaz, 20);
  } else {
    // scramble: build with real shuffle
    queue = pick(BANK.scrambleWords, 20).map(buildScramble);
  }

  document.getElementById('gTitle').textContent = {
    badeeha:'⚡ البديهة', algaz:'🧩 الألغاز',
    scramble:'🔀 المخلوطة', animals:'🐾 خمن الحيوان'
  }[m];

  const aiBtn = document.getElementById('aiGenBtn');
  aiBtn.className = m !== 'animals' ? 'ai-gen-btn' : 'ai-gen-btn hidden';

  document.getElementById('timerWrap').style.display = m === 'badeeha' ? 'block' : 'none';
  document.getElementById('scoreBar').style.display = m === 'animals' ? 'flex' : 'none';

  showScreen('game');
  render();
}

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════
function render() {
  clearInterval(timerID);
  const total = queue.length;
  document.getElementById('progCount').textContent = `سؤال ${idx + 1} من ${total}`;
  document.getElementById('progFill').style.width = (idx / total * 100) + '%';
  document.getElementById('liveScore').textContent = score;
  const area = document.getElementById('cardScroll');
  area.innerHTML = '';

  if (mode === 'animals') renderAnimal(queue[idx], area);
  else if (mode === 'scramble') renderScramble(queue[idx], area);
  else renderDefault(queue[idx], area);
}

function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html) e.innerHTML = html;
  return e;
}

function renderDefault(q, area) {
  const card = el('div', 'q-card',
    `<div class="q-tag">السؤال</div>
     <div class="q-text">${q.q}</div>
     ${q.h ? `<div class="q-hint">💡 ${q.h}</div>` : ''}`
  );
  const ans = el('div', 'ans-card',
    `<div class="ans-label">✅ الجواب</div><div class="ans-text">${q.a}</div>`
  );
  const row = el('div', 'btn-row');
  const bShow = el('button', 'btn btn-show'); bShow.textContent = '👁️ عرض الجواب';
  const bNext = el('button', 'btn btn-next');
  bNext.textContent = idx < queue.length - 1 ? 'التالي ←' : '🏁 النتيجة';
  bShow.onclick = () => { clearInterval(timerID); ans.classList.add('show'); bShow.disabled = true; };
  bNext.onclick = next;
  row.append(bShow, bNext);
  area.append(card, ans, row);
  if (mode === 'badeeha') startTimer();
}

function renderScramble(q, area) {
  const tiles = q.display.split(' ').map(c =>
    `<div class="tile">${c}</div>`
  ).join('');
  const card = el('div', 'q-card',
    `<div class="q-tag">🔀 رتب الحروف</div>
     <div class="q-text">ما هي الكلمة؟</div>
     <div class="tiles">${tiles}</div>`
  );
  const ans = el('div', 'ans-card',
    `<div class="ans-label">✅ الكلمة</div><div class="ans-text">${q.a}</div>`
  );
  const row = el('div', 'btn-row');
  const bShow = el('button', 'btn btn-show'); bShow.textContent = '👁️ الحل';
  const bNext = el('button', 'btn btn-next');
  bNext.textContent = idx < queue.length - 1 ? 'التالي ←' : '🏁 النتيجة';
  bShow.onclick = () => { ans.classList.add('show'); bShow.disabled = true; };
  bNext.onclick = next;
  row.append(bShow, bNext);
  area.append(card, ans, row);
}

function renderAnimal(a, area) {
  // Photo box
  const wrap = el('div', 'photo-wrap');
  const img = document.createElement('img');
  img.className = 'animal-img';
  img.alt = a.name;
  img.src = a.img;
  img.onerror = () => { img.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/Gatto_europeo4.jpg/400px-Gatto_europeo4.jpg'; };

  // Tile overlay – 16 tiles
  const overlay = el('div', 'reveal-overlay');
  const tiles = Array.from({length: 16}, () => {
    const t = el('div', 'rv'); overlay.appendChild(t); return t;
  });
  // Start: show only 4 tiles visible (12 covered)
  const order = shuffle([...Array(16).keys()]);
  // show first 4 immediately
  order.slice(0, 4).forEach(i => tiles[i].classList.add('gone'));

  wrap.append(img, overlay);

  // Step indicator
  const steps = el('div', 'reveal-steps');
  const dots = Array.from({length: 4}, (_, i) => {
    const d = el('div', i === 0 ? 'rstep done' : 'rstep');
    steps.appendChild(d); return d;
  });

  // Options
  const opts = el('div', 'opts-grid');
  let answered = false;
  shuffle(a.opts).forEach(opt => {
    const b = el('button', 'opt'); b.textContent = opt;
    b.onclick = () => {
      if (answered) return;
      answered = true;
      if (opt === a.name) { b.classList.add('correct'); score++; document.getElementById('liveScore').textContent = score; }
      else {
        b.classList.add('wrong');
        opts.querySelectorAll('.opt').forEach(x => { if (x.textContent === a.name) x.classList.add('correct'); });
      }
      tiles.forEach(t => t.classList.add('gone')); // full reveal
      setTimeout(() => { idx < queue.length - 1 ? (idx++, render()) : showEnd(); }, 1500);
    };
    opts.appendChild(b);
  });

  // Reveal more button
  let revStep = 0;
  const moreBtn = el('button', 'more-btn'); moreBtn.textContent = '🔍 كشف أكثر';
  moreBtn.onclick = () => {
    revStep++;
    const from = 4 + (revStep - 1) * 3;
    order.slice(from, from + 3).forEach(i => tiles[i].classList.add('gone'));
    if (revStep < 4) dots[revStep].classList.add('done');
    if (revStep >= 4) { moreBtn.disabled = true; moreBtn.textContent = '✅ كشف كامل'; }
  };

  area.append(wrap, steps, opts, moreBtn);
}

// ══════════════════════════════════════
// TIMER
// ══════════════════════════════════════
function startTimer() {
  timeLeft = 8;
  updateTimerUI();
  timerID = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) {
      clearInterval(timerID);
      const ans = document.querySelector('.ans-card');
      if (ans) ans.classList.add('show');
      const bShow = document.querySelector('.btn-show');
      if (bShow) bShow.disabled = true;
    }
  }, 1000);
}
function updateTimerUI() {
  document.getElementById('timerNum').textContent = timeLeft;
  const circ = 125.7;
  document.getElementById('tcFill').style.strokeDashoffset = circ - (timeLeft / 8) * circ;
  document.getElementById('tcFill').style.stroke = timeLeft <= 3 ? 'var(--a1)' : 'var(--a4)';
}

// ══════════════════════════════════════
// NEXT / END
// ══════════════════════════════════════
function next() {
  clearInterval(timerID);
  idx < queue.length - 1 ? (idx++, render()) : showEnd();
}

function showEnd() {
  const total = queue.length;
  document.getElementById('scoreNum').textContent = mode === 'animals' ? score : '🎉';
  document.getElementById('scoreLbl').textContent = mode === 'animals' ? `من ${total} سؤال` : 'أكملت اللعبة!';
  document.getElementById('endTitle').textContent = mode === 'animals'
    ? (score >= total * .8 ? '🔥 رائع!' : score >= total * .5 ? '👍 جيد!' : '💪 حاول مجدداً!')
    : 'انتهت اللعبة!';
  document.getElementById('endSub').textContent = mode === 'animals'
    ? `أجبت صح على ${score} من ${total}`
    : `شاطر! أكملت جميع الأسئلة 🎊`;
  showScreen('end');
}

// ══════════════════════════════════════
// AI GENERATION
// ══════════════════════════════════════
async function generateWithAI() {
  const area = document.getElementById('cardScroll');
  area.innerHTML = `<div class="ai-loading"><div class="ai-spinner"></div><div style="color:var(--muted);font-size:14px">✨ Claude يولّد أسئلة جديدة...</div></div>`;
  document.getElementById('aiGenBtn').disabled = true;

  const prompts = {
    badeeha: `اصنع 10 أسئلة بديهة سريعة باللغة العربية. كل سؤال له جواب واضح جداً لكن اللعبة إنك تقول الجواب الغلط. أعطني JSON فقط بدون أي نص آخر: [{"q":"...","h":"لا تقول ...!","a":"..."}]`,
    algaz: `اصنع 10 ألغاز عربية ممتعة للعب الجماعي. أعطني JSON فقط بدون أي نص آخر: [{"q":"...","a":"..."}]`,
    scramble: `أعطني 10 كلمات عربية مألوفة (كل كلمة من 3-6 حروف). أعطني JSON فقط بدون أي نص آخر: ["كلمة1","كلمة2",...]`,
  };

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompts[mode] }]
      })
    });
    const data = await resp.json();
    const text = data.content.map(c => c.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    let newItems;
    if (mode === 'scramble') {
      newItems = parsed.map(w => buildScramble(w));
    } else {
      newItems = parsed;
    }

    queue = [...newItems, ...queue];
    idx = 0;
    document.getElementById('aiGenBtn').disabled = false;
    render();
  } catch (e) {
    document.getElementById('aiGenBtn').disabled = false;
    render();
  }
}
