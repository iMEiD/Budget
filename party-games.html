<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎉 ألعاب جماعية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07080f; --card:#0f1018; --border:rgba(255,255,255,0.07);
  --a1:#ff3cac; --a2:#784ba0; --a3:#2b86c5; --a4:#00f5a0;
  --text:#f0f0ff; --muted:#6b6b88; --r:20px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}

/* noise overlay */
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.4}

.screen{display:none;flex-direction:column;height:100vh;overflow:hidden}
.screen.active{display:flex}

/* ─── HOME ─── */
#home{background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(255,60,172,0.13) 0%,transparent 70%),var(--bg);align-items:center;justify-content:flex-start;padding:40px 20px 30px;gap:0;overflow-y:auto}
.home-top{text-align:center;margin-bottom:32px}
.logo-ring{width:90px;height:90px;margin:0 auto 16px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a3));display:flex;align-items:center;justify-content:center;font-size:40px;box-shadow:0 0 40px rgba(255,60,172,0.4);animation:pulse 3s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(255,60,172,0.4)}50%{box-shadow:0 0 70px rgba(255,60,172,0.7)}}
.home-title{font-size:28px;font-weight:900;background:linear-gradient(135deg,#fff,rgba(255,255,255,0.6));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
.home-sub{color:var(--muted);font-size:14px;margin-top:6px}
.game-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:400px}
.gcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px 14px 18px;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;text-align:center}
.gcard:active{transform:scale(.94)}
.gcard::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;border-radius:var(--r)}
.gcard:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.5)}
.gcard:hover::before{opacity:1}
.gc1::before{background:linear-gradient(135deg,rgba(255,60,172,.2),transparent)}
.gc2::before{background:linear-gradient(135deg,rgba(120,75,160,.25),transparent)}
.gc3::before{background:linear-gradient(135deg,rgba(43,134,197,.2),transparent)}
.gc4::before{background:linear-gradient(135deg,rgba(0,245,160,.15),transparent)}
.gcard-icon{font-size:34px;margin-bottom:10px;display:block;position:relative;z-index:1}
.gcard-name{font-size:13px;font-weight:700;position:relative;z-index:1}
.gcard-sub{font-size:11px;color:var(--muted);margin-top:4px;position:relative;z-index:1}
.ai-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(0,245,160,.1);border:1px solid rgba(0,245,160,.25);border-radius:99px;padding:4px 10px;font-size:11px;color:var(--a4);margin-top:14px}

/* ─── GAME SCREEN ─── */
#game{padding:0}
.game-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;flex-shrink:0}
.back-btn{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:99px;padding:7px 16px;font-size:13px;font-family:'Tajawal',sans-serif;cursor:pointer}
.game-mode-title{font-size:14px;font-weight:700;color:var(--muted)}
.ai-gen-btn{background:rgba(0,245,160,.12);border:1px solid rgba(0,245,160,.3);color:var(--a4);border-radius:99px;padding:7px 14px;font-size:12px;font-family:'Tajawal',sans-serif;cursor:pointer;display:none}
.ai-gen-btn.visible{display:block}

.prog-wrap{padding:0 16px 12px;flex-shrink:0}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prog-count{font-size:12px;color:var(--muted)}
.prog-track{height:4px;background:rgba(255,255,255,0.07);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--a1),var(--a3));border-radius:99px;transition:width .4s ease}

.card-scroll{flex:1;overflow-y:auto;padding:0 16px 20px;display:flex;flex-direction:column;align-items:center;gap:14px}

/* question card */
.q-card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:28px 22px;width:100%;max-width:380px;text-align:center;animation:cardIn .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes cardIn{from{opacity:0;transform:scale(.85) translateY(24px)}to{opacity:1;transform:scale(1) translateY(0)}}
.q-tag{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--a1);margin-bottom:14px}
.q-text{font-size:20px;font-weight:900;line-height:1.45}
.q-hint{font-size:12px;color:var(--muted);margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}

/* answer */
.ans-card{background:linear-gradient(135deg,rgba(0,245,160,.12),rgba(43,134,197,.08));border:1px solid rgba(0,245,160,.25);border-radius:16px;padding:14px 20px;text-align:center;width:100%;max-width:380px;display:none;animation:cardIn .3s ease}
.ans-card.show{display:block}
.ans-label{font-size:10px;color:var(--a4);letter-spacing:2px;font-weight:700}
.ans-text{font-size:26px;font-weight:900;margin-top:5px}

/* buttons */
.btn-row{display:flex;gap:10px;width:100%;max-width:380px}
.btn{flex:1;padding:15px;border-radius:14px;border:none;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:transform .15s,opacity .15s}
.btn:active{transform:scale(.95)}
.btn-show{background:linear-gradient(135deg,var(--a2),var(--a1));color:#fff}
.btn-next{background:linear-gradient(135deg,var(--a3),var(--a4));color:#07080f}
.btn:disabled{opacity:.35;pointer-events:none}

/* scramble tiles */
.tiles{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;margin:12px 0}
.tile{min-width:40px;height:46px;padding:0 8px;background:linear-gradient(135deg,var(--a2),var(--a1));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;box-shadow:0 4px 14px rgba(255,60,172,.35)}

/* ─── ANIMAL PHOTO GAME ─── */
.photo-wrap{width:100%;max-width:340px;aspect-ratio:1;border-radius:22px;overflow:hidden;position:relative;border:1px solid var(--border);background:#0d0d18;flex-shrink:0}
.animal-img{width:100%;height:100%;object-fit:cover;display:block}
.reveal-overlay{position:absolute;inset:0;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:2px;pointer-events:none}
.reveal-tile{background:var(--bg);transition:opacity .4s ease}
.reveal-tile.gone{opacity:0}
.reveal-hint{font-size:12px;color:var(--muted);text-align:center}
.reveal-progress{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:4px}
.reveal-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.12);transition:background .3s}
.reveal-dot.active{background:var(--a4)}

.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:340px}
.opt{background:var(--card);border:1.5px solid var(--border);color:var(--text);border-radius:13px;padding:13px 8px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center}
.opt:active{transform:scale(.95)}
.opt.correct{background:rgba(0,245,160,.18);border-color:var(--a4);color:var(--a4)}
.opt.wrong{background:rgba(255,60,172,.12);border-color:var(--a1)}

/* score badge in animals */
.score-bar{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}
.score-val{font-weight:900;color:var(--text);font-size:15px}

/* timer */
.timer-wrap{display:flex;align-items:center;gap:8px}
.timer-circle{width:48px;height:48px;position:relative;flex-shrink:0}
.timer-circle svg{position:absolute;inset:0;transform:rotate(-90deg)}
.timer-circle circle{fill:none;stroke-width:3.5}
.tc-bg{stroke:rgba(255,255,255,.08)}
.tc-fill{stroke:var(--a4);stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .5s}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900}

/* AI loading */
.ai-loading{display:flex;flex-direction:column;align-items:center;gap:14px;padding:40px 20px}
.ai-spinner{width:48px;height:48px;border:3px solid rgba(0,245,160,.15);border-top-color:var(--a4);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-loading-txt{color:var(--muted);font-size:14px}

/* ─── END ─── */
#end{background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(43,134,197,.15) 0%,transparent 70%),var(--bg);align-items:center;justify-content:center;gap:18px;padding:30px 20px}
.end-icon{font-size:72px;animation:pop .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(0) rotate(-20deg)}to{transform:scale(1) rotate(0)}}
.end-title{font-size:30px;font-weight:900}
.end-sub{color:var(--muted);font-size:14px}
.score-pill{background:linear-gradient(135deg,var(--a1),var(--a3));border-radius:20px;padding:22px 44px;text-align:center}
.score-big{font-size:56px;font-weight:900;line-height:1}
.score-lbl{font-size:13px;opacity:.8;margin-top:4px}
.btn-home{background:var(--card);border:1.5px solid var(--border);color:var(--text);border-radius:14px;padding:15px 44px;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="home">
  <div class="home-top">
    <div class="logo-ring">🎉</div>
    <div class="home-title">ألعاب جماعية</div>
    <div class="home-sub">اختار لعبة وابدأ مع الأصحاب</div>
    <div class="ai-badge">✨ يدعم توليد أسئلة بـ AI</div>
  </div>
  <div class="game-grid">
    <div class="gcard gc1" onclick="startGame('badeeha')">
      <span class="gcard-icon">⚡</span>
      <div class="gcard-name">البديهة السريعة</div>
      <div class="gcard-sub">جاوب خطأ!</div>
    </div>
    <div class="gcard gc2" onclick="startGame('algaz')">
      <span class="gcard-icon">🧩</span>
      <div class="gcard-name">الألغاز</div>
      <div class="gcard-sub">فكر وخمن</div>
    </div>
    <div class="gcard gc3" onclick="startGame('scramble')">
      <span class="gcard-icon">🔀</span>
      <div class="gcard-name">الكلمة المخلوطة</div>
      <div class="gcard-sub">رتب الحروف</div>
    </div>
    <div class="gcard gc4" onclick="startGame('animals')">
      <span class="gcard-icon">🐾</span>
      <div class="gcard-name">خمن الحيوان</div>
      <div class="gcard-sub">صور حقيقية</div>
    </div>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="game">
  <div class="game-topbar">
    <button class="back-btn" onclick="goHome()">← رجوع</button>
    <div class="game-mode-title" id="gTitle"></div>
    <button class="ai-gen-btn" id="aiGenBtn" onclick="generateWithAI()">✨ جدّد بـ AI</button>
  </div>
  <div class="prog-wrap">
    <div class="prog-row">
      <span class="prog-count" id="progCount"></span>
      <div class="timer-wrap">
        <div class="timer-circle" id="timerCircle" style="display:none">
          <svg viewBox="0 0 48 48"><circle class="tc-bg" cx="24" cy="24" r="20"/><circle class="tc-fill" id="tcFill" cx="24" cy="24" r="20" stroke-dasharray="125.7" stroke-dashoffset="0"/></svg>
          <div class="timer-num" id="timerNum">8</div>
        </div>
        <div class="score-bar" id="scoreBar" style="display:none">نقاط: <span class="score-val" id="liveScore">0</span></div>
      </div>
    </div>
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>
  <div class="card-scroll" id="cardScroll"></div>
</div>

<!-- END -->
<div class="screen" id="end">
  <div class="end-icon">🏆</div>
  <div class="end-title" id="endTitle">انتهت اللعبة!</div>
  <div class="end-sub" id="endSub"></div>
  <div class="score-pill">
    <div class="score-big" id="scoreNum">0</div>
    <div class="score-lbl" id="scoreLbl">نقطة</div>
  </div>
  <button class="btn-home" onclick="goHome()">🏠 الرئيسية</button>
</div>

<script>
// ═══════════════════════════════════════
// QUESTION BANKS
// ═══════════════════════════════════════

const BANK = {
  badeeha: [
    {q:'ما هو لون السماء؟',h:'لا تقول أزرق!',a:'أزرق'},
    {q:'كم يساوي ٢+٢؟',h:'لا تقول أربعة!',a:'٤'},
    {q:'ما هو عاصمة السعودية؟',h:'لا تقول الرياض!',a:'الرياض'},
    {q:'كم أصبع في اليد؟',h:'لا تقول خمسة!',a:'٥'},
    {q:'ما الحيوان الذي ينهق؟',h:'لا تقول حصان!',a:'الحصان'},
    {q:'ما لون الشمس؟',h:'لا تقول أصفر!',a:'أصفر'},
    {q:'ما هو الشهر الأول في السنة؟',h:'لا تقول يناير!',a:'يناير'},
    {q:'كم يوم في الأسبوع؟',h:'لا تقول سبعة!',a:'٧'},
    {q:'ما الذي يأكله الأرنب؟',h:'لا تقول جزر!',a:'الجزر'},
    {q:'ما الكوكب الذي نسكن فيه؟',h:'لا تقول الأرض!',a:'الأرض'},
    {q:'كم شهر في السنة؟',h:'لا تقول اثنا عشر!',a:'١٢'},
    {q:'ما لون العشب؟',h:'لا تقول أخضر!',a:'أخضر'},
    {q:'ما أبطأ حيوان في العالم؟',h:'لا تقول السلحفاة!',a:'السلحفاة'},
    {q:'من أين تشرق الشمس؟',h:'لا تقول الشرق!',a:'الشرق'},
    {q:'كم عين لديك؟',h:'لا تقول اثنتين!',a:'٢'},
    {q:'ما أطول حيوان في العالم؟',h:'لا تقول الزرافة!',a:'الزرافة'},
    {q:'ما لون الليمون؟',h:'لا تقول أصفر!',a:'أصفر'},
    {q:'كم ساعة في اليوم؟',h:'لا تقول أربعة وعشرين!',a:'٢٤'},
    {q:'الماء في حالته الصلبة يسمى؟',h:'لا تقول جليد!',a:'جليد'},
    {q:'ما عاصمة مصر؟',h:'لا تقول القاهرة!',a:'القاهرة'},
    {q:'كم ساق للحشرة؟',h:'لا تقول ستة!',a:'٦'},
    {q:'ما هو أكبر محيط في العالم؟',h:'لا تقول الهادئ!',a:'المحيط الهادئ'},
    {q:'ما الحيوان الذي يصدر صوت "ميو"؟',h:'لا تقول قطة!',a:'القطة'},
    {q:'ما لون الثلج؟',h:'لا تقول أبيض!',a:'أبيض'},
    {q:'كم ركعة في صلاة الظهر؟',h:'لا تقول أربع!',a:'٤'},
    {q:'ما هو العاصمة الأمريكية؟',h:'لا تقول واشنطن!',a:'واشنطن'},
    {q:'كم لاعب في فريق كرة القدم؟',h:'لا تقول أحد عشر!',a:'١١'},
    {q:'ما الحيوان الذي يعيش في الماء ويلد؟',h:'لا تقول دلفين!',a:'الدلفين'},
    {q:'ما هو أصغر كوكب في المجموعة الشمسية؟',h:'لا تقول عطارد!',a:'عطارد'},
    {q:'كم ضلع للمثلث؟',h:'لا تقول ثلاثة!',a:'٣'},
    {q:'ما هو لون الطماطم؟',h:'لا تقول أحمر!',a:'أحمر'},
    {q:'ما الحيوان الأضخم في البحر؟',h:'لا تقول الحوت!',a:'الحوت الأزرق'},
    {q:'كم جناح للطائر؟',h:'لا تقول جناحين!',a:'٢'},
    {q:'ما هو أسرع وسيلة نقل؟',h:'لا تقول الطائرة!',a:'الطائرة'},
    {q:'ما الفاكهة الصفراء المقشورة؟',h:'لا تقول موز!',a:'الموز'},
    {q:'ما لون التفاحة الشهيرة؟',h:'لا تقول أحمر!',a:'أحمر'},
    {q:'من ملك الغابة؟',h:'لا تقول الأسد!',a:'الأسد'},
    {q:'كم كيلو في الطن؟',h:'لا تقول ألف!',a:'١٠٠٠'},
    {q:'كم يوم في شهر رمضان على الأقل؟',h:'لا تقول تسعة وعشرين!',a:'٢٩'},
    {q:'ما أغلى معدن في العالم؟',h:'لا تقول ذهب!',a:'الذهب'},
  ],
  algaz: [
    {q:'لها أسنان ولا تعض – ما هي؟',a:'المشط'},
    {q:'تأكل ولا تشرب، تعيش ولا تتنفس – ما هي؟',a:'النار'},
    {q:'كلما أخذت منها زادت – ما هي؟',a:'الحفرة'},
    {q:'لها وجه وعقارب ولكن لا تؤذي – ما هي؟',a:'الساعة'},
    {q:'تمشي بدون أرجل وتمد بدون يدين – ما هي؟',a:'الطريق'},
    {q:'أبيض من الخارج أحمر من الداخل وفيه بذور – ما هو؟',a:'البطيخ'},
    {q:'يطير بدون أجنحة، ويبكي بدون عيون – ما هو؟',a:'السحاب'},
    {q:'له عنق ولا رأس له – ما هو؟',a:'الزجاجة'},
    {q:'تملأ الغرفة ولا تشغل حيزاً – ما هي؟',a:'الضوء'},
    {q:'لها قلب ولا تحب – ما هي؟',a:'الخس'},
    {q:'كلما مشيت أمامها ابتعدت – ما هي؟',a:'الظل'},

    {q:'له أذنان ولا يسمع – ما هو؟',a:'الإبريق'},

    {q:'كلما قطعته طال – ما هو؟',a:'الخندق'},
    {q:'لا يؤكل وحده لكن يُستخدم في كل طعام – ما هو؟',a:'الملح'},
    {q:'يقع في الماء ولا يبتل – ما هو؟',a:'الظل'},
    {q:'له بداية ولا نهاية ولا وسط – ما هو؟',a:'الدائرة'},

    {q:'ترتديه وتنامه ولا يلمسك – ما هو؟',a:'الحلم'},
    {q:'ما شيء يتبع صاحبه ويختفي في الظلام؟',a:'الظل'},
    {q:'صغير كالبذرة ويملأ الغرفة؟',a:'المصباح'},
    {q:'ما هو البيت الذي يُحمل على الظهر؟',a:'بيت الحلزون'},
    {q:'يدخل ماءً ويخرج جافاً – ما هو؟',a:'الضوء'},
    {q:'كلما أضفت له ماء كبر – ما هو؟',a:'الحفرة'},
    {q:'له جناحان لكنه لا يطير – ما هو؟',a:'الباب'},
    {q:'يمشي في الليل بلا قدم – ما هو؟',a:'الريح'},
    {q:'ما الشيء الذي كلما أكلت منه جعت أكثر؟',a:'المعرفة'},

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let mode, queue, idx, score, timerID, timeLeft, ansShown;

function shuffle(arr){ return [...arr].sort(()=>Math.random()-.5) }
function pick(arr, n){ return shuffle(arr).slice(0,n) }
function goHome(){ clearInterval(timerID); showScreen('home') }
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active') }

function startGame(m){
  mode = m; idx = 0; score = 0; ansShown = false;
  if(m==='animals'){
    queue = shuffle(ANIMALS);
  } else if(m==='badeeha'){
    queue = pick(BANK.badeeha, 25);
  } else if(m==='algaz'){
    queue = pick(BANK.algaz, 20);
  } else {
    queue = pick(BANK.scramble, 20);
  }
  document.getElementById('gTitle').textContent = {badeeha:'⚡ البديهة',algaz:'🧩 الألغاز',scramble:'🔀 المخلوطة',animals:'🐾 خمن الحيوان'}[m];
  document.getElementById('aiGenBtn').className = (m!=='animals') ? 'ai-gen-btn visible' : 'ai-gen-btn';
  document.getElementById('timerCircle').style.display = m==='badeeha' ? 'flex' : 'none';
  document.getElementById('scoreBar').style.display = m==='animals' ? 'flex' : 'none';
  showScreen('game');
  render();
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function render(){
  clearInterval(timerID); ansShown = false;
  const total = queue.length;
  document.getElementById('progCount').textContent = `سؤال ${idx+1} من ${total}`;
  document.getElementById('progFill').style.width = (idx/total*100)+'%';
  document.getElementById('liveScore').textContent = score;
  const area = document.getElementById('cardScroll');
  area.innerHTML='';
  if(mode==='animals') renderAnimal(queue[idx], area);
  else if(mode==='scramble') renderScramble(queue[idx], area);
  else renderDefault(queue[idx], area);
}

function renderDefault(q, area){
  const card = el('div','q-card',`<div class="q-tag">السؤال</div><div class="q-text">${q.q}</div>${q.h?`<div class="q-hint">💡 ${q.h}</div>`:''}`);
  const ans = el('div','ans-card',`<div class="ans-label">✅ الجواب</div><div class="ans-text">${q.a}</div>`);
  const row = el('div','btn-row');
  const bShow = el('button','btn btn-show'); bShow.textContent='👁️ عرض الجواب';
  const bNext = el('button','btn btn-next'); bNext.textContent = idx<queue.length-1 ? 'التالي ←' : '🏁 النتيجة';
  bShow.onclick=()=>{ clearInterval(timerID); ans.classList.add('show'); bShow.disabled=true; };
  bNext.onclick=()=>next();
  row.append(bShow,bNext);
  area.append(card,ans,row);
  if(mode==='badeeha') startTimer();
}

function renderScramble(q, area){
  const tiles = q.s.split(' ').map(l=>`<div class="tile">${l}</div>`).join('');
  const card = el('div','q-card',`<div class="q-tag">🔀 رتب الحروف</div><div class="q-text">ما هي الكلمة؟</div><div class="tiles">${tiles}</div>`);
  const ans = el('div','ans-card',`<div class="ans-label">✅ الكلمة</div><div class="ans-text">${q.a}</div>`);
  const row = el('div','btn-row');
  const bShow = el('button','btn btn-show'); bShow.textContent='👁️ الحل';
  const bNext = el('button','btn btn-next'); bNext.textContent = idx<queue.length-1 ? 'التالي ←' : '🏁 النتيجة';
  bShow.onclick=()=>{ ans.classList.add('show'); bShow.disabled=true; };
  bNext.onclick=()=>next();
  row.append(bShow,bNext);
  area.append(card,ans,row);
}

function renderAnimal(a, area){
  // photo reveal setup
  const photoWrap = el('div','photo-wrap');
  const img = document.createElement('img');
  img.src = a.img; img.alt = a.name; img.className='animal-img';
  const overlay = el('div','reveal-overlay');
  const tiles = [];
  for(let i=0;i<16;i++){ const t=el('div','reveal-tile'); overlay.appendChild(t); tiles.push(t); }
  photoWrap.append(img, overlay);

  // reveal dots
  const dotsWrap = el('div','reveal-progress');
  const dots = [0,1,2,3].map(()=>{ const d=el('div','reveal-dot'); dotsWrap.appendChild(d); return d; });
  dots[0].classList.add('active');

  const hint = el('div','reveal-hint','🔍 اضغط "كشف أكثر" لرؤية المزيد');

  // options
  const optsGrid = el('div','opts-grid');
  let answered = false;
  let revealStep = 0; // 0=4tiles shown, …
  // start with 12/16 tiles hidden
  const hidden = shuffle([...Array(16).keys()]);
  // initially show 4 (remove 4 tiles)
  hidden.slice(0,4).forEach(i=> tiles[i].classList.add('gone'));

  shuffle(a.opts).forEach(opt=>{
    const b = el('button','opt');
    b.textContent = opt;
    b.onclick = ()=>{
      if(answered) return;
      answered=true;
      if(opt===a.name){ b.classList.add('correct'); score++; document.getElementById('liveScore').textContent=score; }
      else { b.classList.add('wrong'); optsGrid.querySelectorAll('.opt').forEach(x=>{if(x.textContent===a.name)x.classList.add('correct')}); }
      // reveal all
      tiles.forEach(t=>t.classList.add('gone'));
      setTimeout(()=>{ if(idx<queue.length-1){idx++;render();}else showEnd(); },1400);
    };
    optsGrid.appendChild(b);
  });

  // reveal more button
  const revBtn = el('button','btn btn-show');
  revBtn.style.maxWidth='340px'; revBtn.style.width='100%';
  revBtn.textContent = '🔍 كشف أكثر';
  revBtn.onclick = ()=>{
    revealStep++;
    const toReveal = hidden.slice(4 + (revealStep-1)*3, 4 + revealStep*3);
    toReveal.forEach(i=> tiles[i].classList.add('gone'));
    if(revealStep<4){ dots[revealStep].classList.add('active'); }
    if(revealStep>=4){ revBtn.disabled=true; revBtn.textContent='تم الكشف الكامل'; }
  };

  area.append(photoWrap, dotsWrap, hint, optsGrid, revBtn);
}

// ═══════════════════════════════════════
// TIMER
// ═══════════════════════════════════════
function startTimer(){
  timeLeft = 8;
  updateTimer();
  timerID = setInterval(()=>{
    timeLeft--;
    updateTimer();
    if(timeLeft<=0){
      clearInterval(timerID);
      // auto-show answer
      const ans = document.querySelector('.ans-card');
      if(ans) ans.classList.add('show');
      const bShow = document.querySelector('.btn-show');
      if(bShow) bShow.disabled=true;
    }
  },1000);
}
function updateTimer(){
  document.getElementById('timerNum').textContent = timeLeft;
  const circ = 125.7;
  const offset = circ - (timeLeft/8)*circ;
  document.getElementById('tcFill').style.strokeDashoffset = offset;
  document.getElementById('tcFill').style.stroke = timeLeft<=3 ? 'var(--a1)' : 'var(--a4)';
}

// ═══════════════════════════════════════
// NEXT / END
// ═══════════════════════════════════════
function next(){
  clearInterval(timerID);
  if(idx < queue.length-1){ idx++; render(); }
  else showEnd();
}

function showEnd(){
  const total = queue.length;
  document.getElementById('scoreNum').textContent = mode==='animals' ? score : '🎉';
  document.getElementById('scoreLbl').textContent = mode==='animals' ? `من ${total} سؤال` : 'أكملت اللعبة!';
  document.getElementById('endTitle').textContent = mode==='animals' ? (score>=total*0.8?'رائع!':score>=total*0.5?'جيد!':'حاول مجدداً!') : 'انتهت اللعبة!';
  document.getElementById('endSub').textContent = mode==='animals' ? `أجبت صح على ${score} من ${total}` : `شاطر! كملت كل الأسئلة 🎊`;
  showScreen('end');
}

// ═══════════════════════════════════════
// AI GENERATION
// ═══════════════════════════════════════
async function generateWithAI(){
  const area = document.getElementById('cardScroll');
  area.innerHTML=`<div class="ai-loading"><div class="ai-spinner"></div><div class="ai-loading-txt">✨ Claude يولّد أسئلة جديدة...</div></div>`;
  document.getElementById('aiGenBtn').disabled=true;

  const prompts = {
    badeeha: 'اصنع 10 أسئلة بديهة سريعة باللغة العربية الخليجية. كل سؤال لازم يكون الجواب الصحيح واضح جداً لكن اللعبة هي إنك تقول الجواب الغلط. أعطني JSON فقط: [{"q":"...","h":"لا تقول ...!","a":"..."}]',
    algaz: 'اصنع 10 ألغاز عربية ممتعة ومتنوعة للعب الجماعي. أعطني JSON فقط: [{"q":"...","a":"..."}]',
    scramble: 'اصنع 10 كلمات عربية مألوفة مكتوبة بشكل مبعثر (حرف حرف بمسافة). أعطني JSON فقط: [{"s":"ح ر ف ...","a":"الكلمة"}]',
  };

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:prompts[mode]}]
      })
    });
    const data = await resp.json();
    const text = data.content.map(c=>c.text||'').join('');
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    // prepend to queue
    queue = [...parsed, ...queue];
    idx = 0;
    document.getElementById('aiGenBtn').disabled=false;
    render();
  } catch(e){
    area.innerHTML='';
    document.getElementById('aiGenBtn').disabled=false;
    render();
  }
}

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
function el(tag, cls='', html=''){
  const e = document.createElement(tag);
  if(cls) e.className=cls;
  if(html) e.innerHTML=html;
  return e;
}
