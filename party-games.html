<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🎉 ألعاب جماعية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a12;
    --card: #14141f;
    --accent1: #ff3cac;
    --accent2: #784ba0;
    --accent3: #2b86c5;
    --accent4: #00f5a0;
    --text: #f0f0ff;
    --muted: #888;
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== BG GLOW ===== */
  body::before {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,60,172,0.12) 0%, transparent 70%);
    top: -200px; left: -200px;
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(43,134,197,0.12) 0%, transparent 70%);
    bottom: -150px; right: -150px;
    pointer-events: none; z-index: 0;
  }

  .screen { display: none; position: relative; z-index: 1; min-height: 100vh; padding: 20px 16px 40px; }
  .screen.active { display: flex; flex-direction: column; }

  /* ===== HOME ===== */
  #home {
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 12px;
  }
  .logo { font-size: 64px; margin-bottom: 8px; animation: bounce 2s infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .home-title {
    font-size: 36px; font-weight: 900;
    background: linear-gradient(135deg, var(--accent1), var(--accent3));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1.2;
  }
  .home-sub { color: var(--muted); font-size: 15px; margin-bottom: 24px; }
  .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; max-width: 380px; }
  .game-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 22px 14px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.06);
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .game-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .game-card:active { transform: scale(0.95); }
  .game-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
  .game-card:hover::before { opacity: 1; }
  .gc1::before { background: linear-gradient(135deg, rgba(255,60,172,0.15), transparent); }
  .gc2::before { background: linear-gradient(135deg, rgba(120,75,160,0.2), transparent); }
  .gc3::before { background: linear-gradient(135deg, rgba(43,134,197,0.2), transparent); }
  .gc4::before { background: linear-gradient(135deg, rgba(0,245,160,0.15), transparent); }
  .game-card .icon { font-size: 36px; margin-bottom: 10px; display: block; position: relative; z-index: 1; }
  .game-card .label { font-size: 14px; font-weight: 700; position: relative; z-index: 1; }
  .game-card .count { font-size: 11px; color: var(--muted); position: relative; z-index: 1; margin-top: 4px; }

  /* ===== GAME SCREEN ===== */
  #game {
    padding-top: 16px;
  }
  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .back-btn {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    border-radius: 50px;
    padding: 8px 18px;
    font-size: 14px;
    font-family: 'Tajawal', sans-serif;
    cursor: pointer;
  }
  .game-title { font-size: 16px; font-weight: 700; }
  .progress-wrap { display: flex; align-items: center; gap: 8px; }
  .progress-bar-bg {
    width: 100%; height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent1), var(--accent3));
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .q-counter { font-size: 13px; color: var(--muted); }

  .card-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .question-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 32px 24px;
    text-align: center;
    width: 100%;
    max-width: 360px;
    position: relative;
    animation: cardIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes cardIn {
    from { opacity:0; transform: scale(0.85) translateY(20px); }
    to   { opacity:1; transform: scale(1)   translateY(0); }
  }
  .q-category {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent1);
    margin-bottom: 16px;
  }
  .q-text { font-size: 22px; font-weight: 900; line-height: 1.4; }
  .q-hint {
    font-size: 13px;
    color: var(--muted);
    margin-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.06);
    padding-top: 14px;
  }

  /* answer reveal */
  .answer-reveal {
    background: linear-gradient(135deg, rgba(0,245,160,0.15), rgba(43,134,197,0.1));
    border: 1px solid rgba(0,245,160,0.3);
    border-radius: 16px;
    padding: 16px 22px;
    text-align: center;
    width: 100%;
    max-width: 360px;
    display: none;
    animation: cardIn 0.3s ease;
  }
  .answer-reveal.show { display: block; }
  .answer-label { font-size: 11px; color: var(--accent4); letter-spacing: 2px; font-weight: 700; }
  .answer-text { font-size: 24px; font-weight: 900; margin-top: 6px; }

  .btn-row { display: flex; gap: 12px; width: 100%; max-width: 360px; }
  .btn {
    flex: 1; padding: 16px;
    border-radius: 14px;
    border: none;
    font-family: 'Tajawal', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  .btn:active { transform: scale(0.95); }
  .btn-show {
    background: linear-gradient(135deg, var(--accent2), var(--accent1));
    color: white;
  }
  .btn-next {
    background: linear-gradient(135deg, var(--accent3), var(--accent4));
    color: #0a0a12;
  }

  /* ===== SCRAMBLE SPECIAL ===== */
  .letters-box {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin: 10px 0;
  }
  .letter-tile {
    width: 42px; height: 48px;
    background: linear-gradient(135deg, var(--accent2), var(--accent1));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 900;
    box-shadow: 0 4px 12px rgba(255,60,172,0.3);
  }

  /* ===== IMAGE GAME ===== */
  .img-reveal-box {
    width: 260px; height: 260px;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    border: 2px solid rgba(255,255,255,0.1);
    margin: 0 auto;
  }
  .img-reveal-box img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .img-mask {
    position: absolute;
    inset: 0;
    background: var(--card);
    transition: clip-path 0.6s ease;
  }
  .img-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 360px;
  }
  .opt-btn {
    background: var(--card);
    border: 1.5px solid rgba(255,255,255,0.1);
    color: var(--text);
    border-radius: 12px;
    padding: 14px 10px;
    font-family: 'Tajawal', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .opt-btn:active { transform: scale(0.95); }
  .opt-btn.correct { background: rgba(0,245,160,0.2); border-color: var(--accent4); color: var(--accent4); }
  .opt-btn.wrong   { background: rgba(255,60,172,0.15); border-color: var(--accent1); }

  /* ===== END SCREEN ===== */
  #end {
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 16px;
  }
  .confetti { font-size: 72px; animation: spin 1s ease; }
  @keyframes spin { from{transform:rotate(-20deg) scale(0.5)} to{transform:rotate(0) scale(1)} }
  .end-title { font-size: 30px; font-weight: 900; }
  .end-sub { color: var(--muted); }
  .score-badge {
    background: linear-gradient(135deg, var(--accent1), var(--accent3));
    border-radius: 20px;
    padding: 24px 40px;
  }
  .score-big { font-size: 52px; font-weight: 900; }
  .score-lbl { font-size: 14px; opacity: 0.8; }
  .btn-home {
    background: var(--card);
    border: 1.5px solid rgba(255,255,255,0.12);
    color: var(--text);
    border-radius: 14px;
    padding: 16px 40px;
    font-family: 'Tajawal', sans-serif;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
  }

  /* timer ring */
  .timer-ring { width: 56px; height: 56px; position: relative; }
  .timer-ring svg { position: absolute; inset: 0; transform: rotate(-90deg); }
  .timer-ring circle { fill: none; stroke-width: 4; }
  .ring-bg { stroke: rgba(255,255,255,0.08); }
  .ring-fill { stroke: var(--accent1); stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  .timer-num {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900;
  }
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="home">
  <div class="logo">🎉</div>
  <div class="home-title">ألعاب جماعية</div>
  <div class="home-sub">اختار لعبة وابدأ مع الأصحاب!</div>
  <div class="game-grid">
    <div class="game-card gc1" onclick="startGame('badeeha')">
      <span class="icon">⚡</span>
      <div class="label">البديهة السريعة</div>
      <div class="count">جاوب خطأ!</div>
    </div>
    <div class="game-card gc2" onclick="startGame('algaz')">
      <span class="icon">🧩</span>
      <div class="label">الألغاز</div>
      <div class="count">20 لغز</div>
    </div>
    <div class="game-card gc3" onclick="startGame('scramble')">
      <span class="icon">🔀</span>
      <div class="label">الكلمة المخلوطة</div>
      <div class="count">رتب الحروف!</div>
    </div>
    <div class="game-card gc4" onclick="startGame('animals')">
      <span class="icon">🐾</span>
      <div class="label">خمن الحيوان</div>
      <div class="count">من أي حيوان؟</div>
    </div>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="game">
  <div class="game-header">
    <button class="back-btn" onclick="goHome()">← رجوع</button>
    <div class="game-title" id="gTitle"></div>
    <div class="timer-ring" id="timerRing" style="display:none">
      <svg viewBox="0 0 56 56"><circle class="ring-bg" cx="28" cy="28" r="24"/><circle class="ring-fill" id="ringFill" cx="28" cy="28" r="24" stroke-dasharray="150.8" stroke-dashoffset="0"/></svg>
      <div class="timer-num" id="timerNum">10</div>
    </div>
  </div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progBar" style="width:0%"></div></div>
  <div class="q-counter" id="qCounter"></div>

  <div class="card-area" id="cardArea"></div>
</div>

<!-- END -->
<div class="screen" id="end">
  <div class="confetti">🏆</div>
  <div class="end-title">انتهت اللعبة!</div>
  <div class="end-sub" id="endSub"></div>
  <div class="score-badge">
    <div class="score-big" id="scoreNum">0</div>
    <div class="score-lbl">نقطة</div>
  </div>
  <button class="btn-home" onclick="goHome()">🏠 الرئيسية</button>
</div>

<script>
const GAMES = {
  badeeha: {
    title: '⚡ البديهة – جاوب خطأ!',
    hasTimer: true,
    timerSec: 8,
    questions: [
      {q: 'ما هو لون السماء؟', hint: 'لا تقول الصح!', a: 'أزرق'},
      {q: 'كم يساوي ٢+٢؟', hint: 'لا تقول 4!', a: '٤'},
      {q: 'ما هو عاصمة السعودية؟', hint: 'قل أي شيء غير الرياض!', a: 'الرياض'},
      {q: 'كم أصبع في اليد؟', hint: 'لا تقول ٥!', a: '٥'},
      {q: 'ما هو الحيوان الذي ينهق؟', hint: 'لا تقول حصان!', a: 'الحصان'},
      {q: 'ما لون الشمس؟', hint: 'لا تقول أصفر!', a: 'أصفر'},
      {q: 'ما هو الشهر الأول في السنة؟', hint: 'لا تقول يناير!', a: 'يناير'},
      {q: 'كم يوم في الأسبوع؟', hint: 'لا تقول 7!', a: '٧'},
      {q: 'ما هو الطعام الذي يأكله الأرنب؟', hint: 'لا تقول جزر!', a: 'الجزر'},
      {q: 'ما هو الكوكب الذي نسكن فيه؟', hint: 'لا تقول الأرض!', a: 'الأرض'},
      {q: 'كم شهر في السنة؟', hint: 'لا تقول ١٢!', a: '١٢'},
      {q: 'ما لون العشب؟', hint: 'لا تقول أخضر!', a: 'أخضر'},
      {q: 'ما هو الحيوان الذي يمشي ببطء؟', hint: 'لا تقول السلحفاة!', a: 'السلحفاة'},
      {q: 'ما هو شكل البيضة؟', hint: 'لا تقول بيضاوي!', a: 'بيضاوي'},
      {q: 'من أين تشرق الشمس؟', hint: 'لا تقول الشرق!', a: 'الشرق'},
      {q: 'كم عين لديك؟', hint: 'لا تقول ٢!', a: '٢'},
      {q: 'ما هو أطول حيوان؟', hint: 'لا تقول الزرافة!', a: 'الزرافة'},
      {q: 'ما هو لون الليمون؟', hint: 'لا تقول أصفر!', a: 'أصفر'},
      {q: 'كم ساعة في اليوم؟', hint: 'لا تقول ٢٤!', a: '٢٤'},
      {q: 'ما هو الماء في حالته الصلبة؟', hint: 'لا تقول جليد!', a: 'الجليد'},
    ]
  },
  algaz: {
    title: '🧩 الألغاز',
    hasTimer: false,
    questions: [
      {q: 'لها أسنان ولا تعض – ما هي؟', a: 'المشط'},
      {q: 'تأكل ولا تشرب، تعيش ولا تتنفس – ما هي؟', a: 'النار'},
      {q: 'كلما أخذت منها زادت – ما هي؟', a: 'الحفرة'},
      {q: 'لها وجه وعقارب ولكن لا تؤذي – ما هي؟', a: 'الساعة'},
      {q: 'تمشي بدون أرجل وتمد بدون يدين – ما هي؟', a: 'الطريق'},
      {q: 'أبيض من الحليب، أخضر من العشب، أحمر من الدم، أسود من الفحم – ما هو؟', a: 'البطيخ'},
      {q: 'يطير بدون أجنحة، ويبكي بدون عيون – ما هو؟', a: 'السحاب'},
      {q: 'ترتديه وتنامه ولا يلمسك – ما هو؟', a: 'الحلم'},
      {q: 'له عنق ولا رأس له – ما هو؟', a: 'الزجاجة'},
      {q: 'يدخل المسجد ولا يصلي، ويخرج ولا يسلم – ما هو؟', a: 'الصوت'},
      {q: 'تملأ الغرفة ولا تشغل حيزاً – ما هي؟', a: 'الضوء'},
      {q: 'لها قلب ولا تحب – ما هي؟', a: 'الخس'},
      {q: 'أطول من الليل وأقصر من النهار – ما هو؟', a: 'الكلام'},
      {q: 'كلما مشيت أمامها ابتعدت – ما هي؟', a: 'الظل'},
      {q: 'تصعد ولا تنزل أبداً – ما هو؟', a: 'العمر'},
      {q: 'له أذنان ولا يسمع – ما هو؟', a: 'الإبريق'},
      {q: 'في القاموس تجدها لكن في الواقع لا – ما هي؟', a: 'الكلمات'},

    hasTimer: false,
    isScramble: true,

      {scrambled: 'ة ر ي س ي', a: 'سيارة'},

      {scrambled: 'ب ل ق', a: 'قلب'},
      {scrambled: 'ء ا م', a: 'ماء'},
      {scrambled: 'س م ش', a: 'شمس'},
      {scrambled: 'ر م ق', a: 'قمر'},

      {scrambled: 'ن ا س ن إ', a: 'إنسان'},

    questions: [

      {q: 'يمشي ببطء ولديه أشواك على ظهره', options: ['القنفذ','الفأر','الأرنب','الضبة'], a: 'القنفذ'},
      {q: 'أذناه طويلتان جداً ويقفز بسرعة', options: ['الكنغر','الأرنب','القطة','الثعلب'], a: 'الأرنب'},
      {q: 'يعيش في الأعماق، له 8 أذرع', options: ['الدلفين','الحبار','الأخطبوط','الروبيان'], a: 'الأخطبوط'},
      {q: 'طائر يقلد الكلام البشري بدقة', options: ['الببغاء','الطاووس','الحمام','البلبل'], a: 'الببغاء'},
      {q: 'زعيم الحيوانات المائية، يبتسم دائماً', options: ['الحوت','القرش','الدلفين','الفظ'], a: 'الدلفين'},
      {q: 'ينام شتاء ويستيقظ ربيعاً', options: ['الدب','الأسد','النمر','الذئب'], a: 'الدب'},
      {q: 'له ذيل كبيث يجمع به الجوز', options: ['الثعلب','السنجاب','الكلب','القط'], a: 'السنجاب'},
      {q: 'يطير في مجموعات ويهاجر شتاءً', options: ['البطة','الغراب','الحمام','النسر'], a: 'البطة'},
    ]
  }
};

let currentGame = null;
let currentIdx = 0;
let score = 0;
let timer = null;
let timeLeft = 10;
let answerShown = false;

function goHome() {
  clearTimeout(timer);
  showScreen('home');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame(key) {
  currentGame = GAMES[key];
  currentIdx = 0;
  score = 0;
  answerShown = false;
  document.getElementById('gTitle').textContent = currentGame.title;
  showScreen('game');
  renderQuestion();
}

function renderQuestion() {
  clearTimeout(timer);
  answerShown = false;
  const g = currentGame;
  const total = g.questions.length;
  const q = g.questions[currentIdx];

  // progress
  const pct = (currentIdx / total) * 100;
  document.getElementById('progBar').style.width = pct + '%';
  document.getElementById('qCounter').textContent = `سؤال ${currentIdx + 1} من ${total}`;

  const area = document.getElementById('cardArea');
  area.innerHTML = '';

  // Timer ring
  const tr = document.getElementById('timerRing');
  if (g.hasTimer) {
    tr.style.display = 'flex';
    startTimer();
  } else {
    tr.style.display = 'none';
  }

  if (g.isScramble) {
    renderScramble(q, area);
  } else if (g.isAnimals) {
    renderAnimals(q, area);
  } else {
    renderDefault(q, area, g);
  }
}

function renderDefault(q, area, g) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.innerHTML = `
    <div class="q-category">${g.title.split(' ')[0]} اللعبة</div>
    <div class="q-text">${q.q}</div>
    ${q.hint ? `<div class="q-hint">💡 ${q.hint}</div>` : ''}
  `;
  area.appendChild(card);

  const ansDiv = document.createElement('div');
  ansDiv.className = 'answer-reveal';
  ansDiv.innerHTML = `<div class="answer-label">✅ الجواب</div><div class="answer-text">${q.a}</div>`;
  area.appendChild(ansDiv);

  const row = document.createElement('div');
  row.className = 'btn-row';
  const btnShow = document.createElement('button');
  btnShow.className = 'btn btn-show';
  btnShow.textContent = '👁️ عرض الجواب';
  btnShow.onclick = () => { clearTimeout(timer); ansDiv.classList.add('show'); btnShow.disabled = true; btnShow.style.opacity='0.4'; };

  const btnNext = document.createElement('button');
  btnNext.className = 'btn btn-next';
  btnNext.textContent = currentIdx < currentGame.questions.length - 1 ? 'التالي ←' : '🏁 النتيجة';
  btnNext.onclick = nextQ;
  row.appendChild(btnShow);
  row.appendChild(btnNext);
  area.appendChild(row);
}

function renderScramble(q, area) {
  const card = document.createElement('div');
  card.className = 'question-card';
  const letters = q.scrambled.split(' ');
  const tilesHTML = letters.map(l => `<div class="letter-tile">${l}</div>`).join('');
  card.innerHTML = `
    <div class="q-category">🔀 رتب الحروف</div>
    <div class="q-text">ما هي الكلمة؟</div>
    <div class="letters-box">${tilesHTML}</div>
  `;
  area.appendChild(card);

  const ansDiv = document.createElement('div');
  ansDiv.className = 'answer-reveal';
  ansDiv.innerHTML = `<div class="answer-label">✅ الكلمة</div><div class="answer-text">${q.a}</div>`;
  area.appendChild(ansDiv);

  const row = document.createElement('div');
  row.className = 'btn-row';
  const btnShow = document.createElement('button');
  btnShow.className = 'btn btn-show';
  btnShow.textContent = '👁️ الحل';
  btnShow.onclick = () => { ansDiv.classList.add('show'); btnShow.disabled = true; btnShow.style.opacity='0.4'; };

  const btnNext = document.createElement('button');
  btnNext.className = 'btn btn-next';
  btnNext.textContent = currentIdx < currentGame.questions.length - 1 ? 'التالي ←' : '🏁 النتيجة';
  btnNext.onclick = nextQ;
  row.appendChild(btnShow);
  row.appendChild(btnNext);
  area.appendChild(row);
}

function renderAnimals(q, area) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.innerHTML = `
    <div class="q-category">🐾 خمن الحيوان</div>
    <div class="q-text" style="font-size:17px;line-height:1.6">${q.q}</div>
  `;
  area.appendChild(card);

  const grid = document.createElement('div');
  grid.className = 'img-options';
  let answered = false;
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => {
      if (answered) return;
      answered = true;
      if (opt === q.a) {
        btn.classList.add('correct');
        score++;
      } else {
        btn.classList.add('wrong');
        // show correct
        grid.querySelectorAll('.opt-btn').forEach(b => {
          if (b.textContent === q.a) b.classList.add('correct');
        });
      }
      setTimeout(() => {
        if (currentIdx < currentGame.questions.length - 1) { currentIdx++; renderQuestion(); }
        else showEnd();
      }, 1200);
    };
    grid.appendChild(btn);
  });
  area.appendChild(grid);
}

function nextQ() {
  if (currentIdx < currentGame.questions.length - 1) {
    currentIdx++;
    renderQuestion();
  } else {
    showEnd();
  }
}

function showEnd() {
  clearTimeout(timer);
  const g = currentGame;
  document.getElementById('scoreNum').textContent = score;
  const hasScore = g.isAnimals;
  document.getElementById('endSub').textContent = hasScore
    ? `أجبت صح على ${score} من ${g.questions.length}`
    : `أكملت جميع الأسئلة! برافو عليك 🎊`;
  showScreen('end');
}

// ===== TIMER =====
function startTimer() {
  timeLeft = currentGame.timerSec || 8;
  updateRing(timeLeft);
  document.getElementById('timerNum').textContent = timeLeft;
  clearTimeout(timer);
  tick();
}
function tick() {
  timer = setTimeout(() => {
    timeLeft--;
    document.getElementById('timerNum').textContent = timeLeft;
    updateRing(timeLeft);
    if (timeLeft > 0) tick();
    else {
      // auto next
      const area = document.getElementById('cardArea');
      const ansDiv = area.querySelector('.answer-reveal');
      if (ansDiv) ansDiv.classList.add('show');
    }
  }, 1000);
}
function updateRing(t) {
  const total = currentGame.timerSec || 8;
  const circ = 150.8;
  const offset = circ - (t / total) * circ;
  document.getElementById('ringFill').style.strokeDashoffset = offset;
  document.getElementById('ringFill').style.stroke = t <= 3 ? '#ff3cac' : '#00f5a0';
}
</script>
